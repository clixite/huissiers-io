server {
    listen 80;
    server_name huissiers.io www.huissiers.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name huissiers.io www.huissiers.io;

    root /opt/huissiers-io;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.tailwindcss.com; img-src 'self' data:; connect-src 'self' formspree.io web3forms.com;" always;

    # Cache static assets 30 days
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block sensitive files
    location ~ /\.(env|git|key|pem) {
        deny all;
    }

    # SSL managed by Certbot (will be added by certbot --nginx)
}
